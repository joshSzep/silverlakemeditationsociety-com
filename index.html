<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverlake Meditation Society</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfdfd;
            --text-color: #0d0d0d;
            --accent-color: #fff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .hero-image {
            width: 100%;
            display: block;
            margin-bottom: 30px;
            border: 5px solid var(--text-color);
            box-sizing: border-box;
            /* Enhances the raw, photocopied look of the flyers */
            filter: contrast(110%) grayscale(10%); 
        }

        .hero-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .info-section {
                flex-direction: row;
                align-items: stretch;
            }
        }

        .details {
            flex: 1;
            font-family: 'Anton', sans-serif;
            font-size: 1.5rem;
            line-height: 1.3;
            text-transform: uppercase;
            padding: 10px;
        }

        .details p {
            margin: 10px 0;
        }

        .marker-text {
            font-family: 'Permanent Marker', cursive;
            font-size: 2rem;
            display: block;
            margin-top: 15px;
            letter-spacing: 2px;
        }

        .action-box {
            flex: 1;
            background-color: var(--text-color);
            color: var(--accent-color);
            padding: 30px;
            border: 3px solid var(--text-color);
            /* Adds a slight, unpolished punk tilt */
            transform: rotate(-1.5deg);
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            text-align: center;
        }

        .action-box h2 {
            font-family: 'Anton', sans-serif;
            margin-top: 0;
            letter-spacing: 1px;
            font-size: 2rem;
        }

        .btn-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            background-color: var(--accent-color);
            color: var(--text-color);
            font-family: 'Anton', sans-serif;
            font-size: 1.1rem;
            text-decoration: none;
            padding: 10px 15px;
            border: 2px solid var(--accent-color);
            text-transform: uppercase;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .btn:hover {
            background-color: var(--text-color);
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            transform: scale(1.05) rotate(1deg);
        }

        .map-container {
            margin-top: 40px;
            border: 5px solid var(--text-color);
            /* Desaturates the map to keep the stark B&W theme intact */
            filter: grayscale(100%) contrast(120%);
            line-height: 0;
        }

        .map-container iframe {
            width: 100%;
            height: 400px;
            border: 0;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-family: 'Anton', sans-serif;
            font-size: 1rem;
            padding-bottom: 20px;
            border-top: 3px solid var(--text-color);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <picture class="hero-image">
            <source media="(min-width: 768px)" srcset="SMS-Web.jpg">
            <img src="SMS-Flyer.jpg" alt="Silverlake Meditation Society - Meditate in Community">
        </picture>

        <div class="info-section">
            <div class="details">
                <p>Meditate In Community</p>
                <p>No Charge</p>
                <p>All Are Welcome</p>
                <span class="marker-text">6:00 PM SUNDAY</span>
                <p style="font-size: 1.2rem; margin-top: 20px; font-family: 'Courier New', Courier, monospace; font-weight: bold;">
                    Cafe Tropical<br>
                    2900 Sunset Blvd<br>
                    Los Angeles, CA 90026
                </p>
            </div>

            <div class="action-box">
                <h2>COMMIT TO SIT</h2>
                <p style="font-family: 'Courier New', Courier, monospace; font-weight: bold;">Add our weekly Sunday session to your calendar.</p>
                <div class="btn-container">
                    <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Silverlake+Meditation+Society&details=Meditate+in+community.+No+charge.+All+are+welcome.&location=Cafe+Tropical,+2900+Sunset+Blvd,+Los+Angeles,+CA+90026&recur=RRULE:FREQ=WEEKLY;BYDAY=SU" target="_blank" class="btn">Google Cal</a>
                    
                    <a href="https://outlook.live.com/calendar/0/deeplink/compose?path=/calendar/action/compose&rru=addevent&subject=Silverlake+Meditation+Society&body=Meditate+in+community.+No+charge.+All+are+welcome.&location=Cafe+Tropical,+2900+Sunset+Blvd,+Los+Angeles,+CA+90026" target="_blank" class="btn">Outlook</a>
                </div>
            </div>
        </div>

        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps?q=Cafe+Tropical,+2900+Sunset+Blvd,+Los+Angeles,+CA+90026&output=embed" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>

        <div class="footer">
            SILVERLAKE MEDITATION SOCIETY &copy; 2026
        </div>
    </div>

</body>
</html>
